name: Plugin Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: central
          server-username: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          server-password: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          VERSION=${{ github.event.inputs.version }}
          RELEASE_BRANCH=release/$VERSION
          
          git ls-remote --exit-code --heads origin $RELEASE_BRANCH && {
            echo "ERROR: $RELEASE_BRANCH already exists"
            exit 1
          }

          git checkout -b $RELEASE_BRANCH
          git push -u origin $RELEASE_BRANCH

      - name: Set release version
        run: |
          mvn -B versions:set \
            -DnewVersion=${{ github.event.inputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit release version
        run: |
          git add pom.xml
          git commit -m "Release ${{ github.event.inputs.version }}"

      - name: Deploy to Maven Central
        run: mvn -B -P release clean deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin release/${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      
