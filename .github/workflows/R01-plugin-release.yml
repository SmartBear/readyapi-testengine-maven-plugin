name: Plugin Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Maven Central settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${env.MAVEN_CENTRAL_USERNAME}</username>
                <password>${env.MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: |
          VERSION=${{ github.event.inputs.version }}
          RELEASE_BRANCH=release/$VERSION
          
          git ls-remote --exit-code --heads origin $RELEASE_BRANCH && {
            echo "ERROR: $RELEASE_BRANCH already exists"
            exit 1
          }

          git checkout -b $RELEASE_BRANCH
          git push -u origin $RELEASE_BRANCH

      - name: Set release version
        run: |
          mvn -B versions:set \
            -DnewVersion=${{ github.event.inputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit release version
        run: |
          git add pom.xml
          if git diff --cached --quiet; then
             echo "No version changes to commit"
           else
             git commit -m "Release ${{ github.event.inputs.version }}"
           fi

      - name: Deploy to Maven Central
        run: mvn -B -P release clean deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin release/${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Calculate next snapshot version
        id: next_version
        run: |
          VERSION=${{ github.event.inputs.version }}

          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          NEXT_PATCH=$((PATCH + 1))

          echo "version=${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Checkout master
        run: |
          git checkout master
          git pull origin master

      - name: Set next snapshot version
        run: |
          mvn -B versions:set \
            -DnewVersion=${{ steps.next_version.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Commit and push next snapshot version
        run: |
          git add pom.xml

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "Prepare for next development iteration ${{ steps.next_version.outputs.version }}"
            git push origin master
          fi
          
